name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format, lint, test
        run: make ci

  linux-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-ebpf

      - name: Install Linux test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq runc slirp4netns clang llvm libbpf-dev linux-headers-$(uname -r)

      - name: Run Linux-gated tests (netns, runc, eBPF)
        run: |
          sudo -E env PATH="$PATH" \
            RELIABURGER_RUNC_TESTS=1 \
            RELIABURGER_NETNS_TESTS=1 \
            RELIABURGER_EBPF_TESTS=1 \
            cargo test --features ebpf -- --test-threads=1
