name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Build PDFs
        run: make pdf

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reliaburger-pdfs
          path: docs/_book/*.pdf

  build-binaries:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            suffix: linux-aarch64
          - target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross and eBPF build deps
        run: |
          cargo install cross --locked
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang llvm libbpf-dev linux-headers-$(uname -r)

      - name: Build release binaries (with eBPF support)
        run: cross build --release --features ebpf --target ${{ matrix.target }}

      - name: Package binaries
        run: |
          cp target/${{ matrix.target }}/release/bun bun-${{ matrix.suffix }}
          cp target/${{ matrix.target }}/release/relish relish-${{ matrix.suffix }}

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: |
            bun-${{ matrix.suffix }}
            relish-${{ matrix.suffix }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-pdf, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Download PDF artifacts
        uses: actions/download-artifact@v4
        with:
          name: reliaburger-pdfs

      - name: Download linux-aarch64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-aarch64

      - name: Download linux-x86_64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.pdf
            bun-*
            relish-*
          generate_release_notes: true
