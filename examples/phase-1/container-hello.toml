# Real container: Alpine hello world
#
# Pulls alpine:latest from Docker Hub and runs echo.
# Requires a real container runtime (runc or Apple Container).
#
# Deploy with:
#   cargo run --bin bun -- --runtime apple   # or --runtime runc
#   cargo run --bin relish -- apply examples/phase-1/container-hello.toml
#   cargo run --bin relish -- status

[job.hello]
image = "alpine:latest"
command = ["echo", "hello from a real container!"]
