# Real container: nginx with health check
#
# Pulls nginx:latest from Docker Hub and runs it with health monitoring.
# Requires a real container runtime (runc or Apple Container).
#
# Deploy with:
#   cargo run --bin bun -- --runtime apple   # or --runtime runc
#   cargo run --bin relish -- apply examples/phase-1/container-nginx.toml
#   cargo run --bin relish -- status

[app.nginx]
image = "nginx:latest"
port = 80

[app.nginx.health]
path = "/"
interval = 5
timeout = 3
threshold_unhealthy = 3
threshold_healthy = 1
