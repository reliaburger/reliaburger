# Full-featured app using most Phase 1 capabilities.
#
# Demonstrates: image, port, health checks, environment variables,
# volumes, init containers, resource limits, and replicas.

[app.myapp]
image = "myapp:v2.1.0"
port = 8080
replicas = 3
cpu = "100m-500m"
memory = "128Mi-512Mi"

[app.myapp.health]
path = "/healthz"
interval = 10
timeout = 3
threshold_unhealthy = 3
threshold_healthy = 1

[app.myapp.env]
DATABASE_URL = "postgres://db:5432/myapp"
LOG_LEVEL = "info"

# Run database migrations before the app starts.
[[app.myapp.init]]
image = "myapp:v2.1.0"
command = ["npm", "run", "migrate"]

# Managed volume for persistent data.
[[app.myapp.volumes]]
path = "/data"
size = "5Gi"

# HostPath volume for shared config.
[[app.myapp.volumes]]
source = "/etc/myapp"
path = "/etc/myapp"

# A one-shot migration job that runs independently.
[job.db-seed]
image = "myapp:v2.1.0"
command = ["npm", "run", "seed"]
