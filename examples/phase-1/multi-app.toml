# Multiple apps in a single config file.
#
# All three apps deploy together when you run:
#   relish apply examples/phase-1/multi-app.toml

[app.web]
image = "nginx:latest"
port = 8080
replicas = 2

[app.web.health]
path = "/"

[app.api]
image = "myapi:v1"
port = 3000
replicas = 2

[app.api.env]
NODE_ENV = "production"

[app.api.health]
path = "/healthz"

[app.worker]
image = "myapi:v1"
command = ["node", "worker.js"]
