# Minimal app configuration for Phase 1.
#
# Build first:
#   cargo build
#
# Deploy with:
#   cargo run --bin relish -- apply examples/phase-1/proc-minimal-app.toml
#
# Without a running agent, this shows a dry-run plan.
# With a running agent (cargo run --bin bun), it deploys for real.

[app.web]
# With ProcessGrill (the default runtime), the image field is recorded
# but ignored — the command below is what actually runs on the host.
# With runc or Apple Container, the image is pulled and used.
image = "proc-grill:image-ignored"
command = ["target/debug/testapp", "--mode", "healthy", "--port", "8080"]
port = 8080

[app.web.health]
path = "/healthz"
interval = 5
timeout = 2
threshold_unhealthy = 3
threshold_healthy = 1

[app.worker]
# A worker with no health check — transitions straight to Running.
image = "proc-grill:image-ignored"
command = ["target/debug/testapp", "--mode", "healthy", "--port", "9090"]
